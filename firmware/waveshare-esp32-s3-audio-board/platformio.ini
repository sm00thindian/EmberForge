; EmberForge thin client — Waveshare ESP32-S3-AUDIO-Board
; Amazon ASIN B0FPCNZS9M / Waveshare ESP32-S3-AUDIO-Board
; Silicon: ESP32-S3R8 (8 MB OPI PSRAM) + 16 MB flash

[env:waveshare-audio]
platform = espressif32 @ ^6.9.0
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
upload_port = /dev/cu.usbmodem101

; WiFi bring-up: audio stub only (pschatzmann libs crash during static init).
; Remove EMBER_WIFI_BRINGUP, src_filter, and restore lib_deps when audio is fixed.
build_flags =
    -std=gnu++17
    -DEMBER_WIFI_BRINGUP=1
    -I include
    -I .

build_src_filter = +<*> -<ember_audio.cpp> -<audio_driver_compat.cpp>

lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0
    adafruit/Adafruit NeoPixel @ ^1.12.0

; Full client with ES7210/ES8311 audio — default flash target
[env:waveshare-audio-full]
extends = env:waveshare-audio
build_flags =
    -std=gnu++17
    -I include
    -I .
build_src_filter = +<*> -<ember_audio_stub.cpp>
lib_deps =
    https://github.com/pschatzmann/arduino-audio-tools.git
    https://github.com/pschatzmann/arduino-audio-driver.git
    https://github.com/pschatzmann/arduino-libhelix.git
    bblanchon/ArduinoJson @ ^7.2.0
    adafruit/Adafruit NeoPixel @ ^1.12.0

; WiFi-only bring-up (no audio libs)
[env:waveshare-wifi-only]
extends = env:waveshare-audio