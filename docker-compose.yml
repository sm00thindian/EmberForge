services:
  emberforge:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./personas:/app/personas:ro
      - ./prompts:/app/prompts
      - ./voices:/app/voices
      - emberforge-state:/app/.emberforge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  emberforge-state: